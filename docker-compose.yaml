version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=entroq
      - POSTGRES_USER=entroq
      - POSTGRES_PASSWORD=entroq
    ports:
      - "5432:5432"
    volumes:
      - ./backend/eqpg/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entroq -d entroq"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  entroq:
    build:
      context: .
      dockerfile: ./cmd/eqpg/Dockerfile
    environment:
      - PGPASSWORD=entroq
    ports:
      - "37706:37706"
      - "9100:9100"
    depends_on:
      postgres:
        condition: service_healthy
    command: 
      - "serve"
      - "--dbaddr=postgres:5432"
      - "--dbname=entroq"
      - "--dbuser=entroq"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./contrib/prometheus.yaml:/etc/prometheus/prometheus.yml
    depends_on:
      - entroq
