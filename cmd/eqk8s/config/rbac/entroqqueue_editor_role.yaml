# This rule is not used by the project eqk8s itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the entroq.my.domain.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: eqk8s
    app.kubernetes.io/managed-by: kustomize
  name: entroqqueue-editor-role
rules:
- apiGroups:
  - entroq.my.domain
  resources:
  - entroqqueues
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - entroq.my.domain
  resources:
  - entroqqueues/status
  verbs:
  - get
