apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-a
  namespace: greetings
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-a
  namespace: greetings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-a
  template:
    metadata:
      labels:
        app: svc-a
    spec:
      serviceAccountName: svc-a
      # svc-b.localhost -> 127.0.0.1 so outbound calls reach the eqlink sender.
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - svc-b.localhost
      containers:
      - name: app
        image: greetings-svc-a:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        # eqlink sender listens on :8080. svc-b.localhost resolves to 127.0.0.1
        # via hostAliases below, so this call travels through the queue mesh.
        - name: SVC_B
          value: "http://svc-b.localhost:8080"
      - name: eqlink
        image: entroq-link:dev
        imagePullPolicy: IfNotPresent
        args:
        - run
        - --entroq=entroq.entroq-system.svc.cluster.local:37706
        - --queue=/greetings/svc-a
        - --namespace=greetings
        - --authz-token-file=/var/run/secrets/kubernetes.io/serviceaccount/token
