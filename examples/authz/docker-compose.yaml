services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=entroq
      - POSTGRES_USER=entroq
      - POSTGRES_PASSWORD=entroq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entroq -d entroq"]
      interval: 5s
      timeout: 5s
      retries: 5

  entroq:
    build:
      context: ../..
      dockerfile: ./cmd/eqpg/Dockerfile
    environment:
      - PGPASSWORD=entroq
    ports:
      - "37706:37706"
      - "9100:9100"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
    command:
      - "serve"
      - "--dbaddr=postgres:5432"
      - "--dbname=entroq"
      - "--dbuser=entroq"
      - "--heartbeat=5s"
      - "--init_schema"
      - "--authz=opahttp"
      - "--opa_url=http://opa:8181"

  opa:
    image: openpolicyagent/opa:latest
    command:
      - "run"
      - "--addr=:8181"
      - "--server"
      - "--watch"
      - "--log-level=info"
      - "/etc/opa/core"
      - "/etc/opa/providers"
      - "/etc/opa/local"

    ports:
      - "8181:8181"
    volumes:
      # OPA policy directories seeded by: eqctl opa init ./opa-conf
      # Core EntroQ Rego -- do not modify.
      - ./opa-conf/core:/etc/opa/core
      # Built-in OIDC provider -- do not modify.
      - ./opa-conf/providers:/etc/opa/providers
      # Your config: edit opa-conf/local/data.json for IDP settings and policy.
      - ./opa-conf/local:/etc/opa/local
